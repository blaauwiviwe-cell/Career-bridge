version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: career-bridge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: career_bridge
      MYSQL_USER: careerbridge
      MYSQL_PASSWORD: cbpassword123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - career-bridge-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career-bridge-backend
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: careerbridge
      DB_PASSWORD: cbpassword123
      DB_NAME: career_bridge
      JWT_SECRET: your_jwt_secret_key_here
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - career-bridge-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: career-bridge-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - career-bridge-network

volumes:
  mysql-data:

networks:
  career-bridge-network:
    driver: bridge
